<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — GROWBIT</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{--em:#0A8754;--em-l:#10B981;--gold:#D4AF37;--gold-l:#F0D060;--ch:#0F1320;--ch-m:#161C2D;--ch-l:#1E2538;--tx:#EEF2FF;--tm:#7B8DB0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--ch);color:var(--tx);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(212,175,55,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(212,175,55,.04) 1px,transparent 1px);background-size:56px 56px}
.orb{position:absolute;border-radius:50%;filter:blur(90px)}
.orb1{width:600px;height:600px;background:radial-gradient(circle,rgba(10,135,84,.2),transparent 70%);top:-200px;left:-200px}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(212,175,55,.12),transparent 70%);bottom:-150px;right:-100px}
.card{background:var(--ch-m);border:1px solid rgba(212,175,55,.2);border-radius:24px;padding:44px 40px;width:100%;max-width:440px;position:relative;z-index:2;box-shadow:0 40px 80px rgba(0,0,0,.6)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:24px 24px 0 0}
.brand{font-family:'Cinzel',serif;font-size:1.5rem;font-weight:900;background:linear-gradient(135deg,var(--gold-l),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;text-align:center;margin-bottom:6px}
.tagline{text-align:center;color:var(--tm);font-size:.8rem;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:32px}
.form-group{margin-bottom:18px}
label{display:block;font-size:.78rem;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--tm);margin-bottom:7px}
.inp{width:100%;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);color:var(--tx);padding:12px 16px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.9rem;transition:border-color .2s,box-shadow .2s}
.inp:focus{outline:none;border-color:rgba(212,175,55,.5);box-shadow:0 0 0 3px rgba(212,175,55,.08)}
.inp::placeholder{color:var(--tm)}
.btn-submit{width:100%;background:linear-gradient(135deg,var(--em),var(--em-l));color:#fff;border:none;padding:13px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .25s;letter-spacing:.4px;margin-top:4px;box-shadow:0 6px 20px rgba(10,135,84,.3)}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(10,135,84,.45)}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--tm);font-size:.8rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}
.link-row{text-align:center;font-size:.82rem;color:var(--tm);margin-top:16px}
.link-row a{color:var(--gold-l);text-decoration:none;font-weight:600;transition:color .2s}
.link-row a:hover{color:var(--gold)}
.alert{padding:11px 14px;border-radius:10px;font-size:.83rem;margin-bottom:16px;display:none}
.alert.error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#FCA5A5}
.alert.success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#6EE7B7}
.alert.show{display:block}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.back-link{position:absolute;top:20px;left:24px;color:var(--tm);font-size:.82rem;text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .2s;z-index:3}
.back-link:hover{color:var(--gold-l)}
/* tabs */
.tabs{display:flex;background:rgba(0,0,0,.3);border-radius:10px;padding:4px;margin-bottom:28px}
.tab{flex:1;text-align:center;padding:9px;border-radius:7px;font-size:.82rem;font-weight:600;cursor:pointer;color:var(--tm);transition:all .2s;border:none;background:transparent}
.tab.active{background:rgba(212,175,55,.15);color:var(--gold-l);border:1px solid rgba(212,175,55,.25)}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<a class="back-link" href="index.html">← Home</a>

<div class="card">
  <div class="brand">GROWBIT</div>
  <div class="tagline">Growing Together, Globally</div>

  <div class="tabs">
    <button class="tab active" id="tabLogin" onclick="showPanel('login')">Sign In</button>
    <button class="tab" id="tabReset" onclick="showPanel('reset')">Reset Password</button>
  </div>

  <!-- LOGIN PANEL -->
  <div id="panelLogin">
    <div class="alert error" id="loginErr"></div>
    <div class="alert success" id="loginOk"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input class="inp" id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input class="inp" id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-submit" id="loginBtn" onclick="doLogin()">Sign In to Dashboard</button>
    <div class="link-row" style="margin-top:20px">
      Don't have an account? <a href="#" onclick="showPanel('reset')">Contact Admin</a>
    </div>
  </div>

  <!-- RESET PANEL -->
  <div id="panelReset" style="display:none">
    <div class="alert error" id="resetErr"></div>
    <div class="alert success" id="resetOk"></div>
    <p style="font-size:.83rem;color:var(--tm);margin-bottom:20px;line-height:1.65">Enter your registered email address and we'll send you a password reset link.</p>
    <div class="form-group">
      <label>Email Address</label>
      <input class="inp" id="resetEmail" type="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <button class="btn-submit" id="resetBtn" onclick="doReset()">Send Reset Link</button>
    <div class="link-row">Already have a password? <a href="#" onclick="showPanel('login')">Sign In</a></div>
  </div>
</div>

<script src="firebase-config.js"></script>
<script>
function showPanel(p){
  document.getElementById('panelLogin').style.display=p==='login'?'block':'none';
  document.getElementById('panelReset').style.display=p==='reset'?'block':'none';
  document.getElementById('tabLogin').classList.toggle('active',p==='login');
  document.getElementById('tabReset').classList.toggle('active',p==='reset');
}
function showMsg(id,msg,type){
  const el=document.getElementById(id);
  el.textContent=msg; el.className=`alert ${type} show`;
  if(type==='success') setTimeout(()=>el.classList.remove('show'),5000);
}
function setLoading(btnId,loading,text){
  const b=document.getElementById(btnId);
  b.disabled=loading;
  b.innerHTML=loading?`<span class="spin"></span>${text}...`:text;
}

function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  if(!email||!pass){ showMsg('loginErr','Please fill in all fields.','error'); return; }
  setLoading('loginBtn',true,'Signing In');
  auth.signInWithEmailAndPassword(email,pass)
    .then(cred=>{
      // Check if admin
      return db.collection('users').doc(cred.user.uid).get().then(doc=>{
        const role=doc.exists?doc.data().role:'user';
        window.location.href=role==='admin'?'admin.html':'dashboard.html';
      });
    })
    .catch(err=>{
      setLoading('loginBtn',false,'Sign In to Dashboard');
      const msgs={
        'auth/user-not-found':'No account found with this email.',
        'auth/wrong-password':'Incorrect password.',
        'auth/invalid-email':'Invalid email address.',
        'auth/too-many-requests':'Too many attempts. Please try again later.',
      };
      showMsg('loginErr',msgs[err.code]||err.message,'error');
    });
}

function doReset(){
  const email=document.getElementById('resetEmail').value.trim();
  if(!email){ showMsg('resetErr','Please enter your email.','error'); return; }
  setLoading('resetBtn',true,'Sending');
  auth.sendPasswordResetEmail(email)
    .then(()=>{
      setLoading('resetBtn',false,'Send Reset Link');
      showMsg('resetOk','Reset link sent! Check your inbox.','success');
    })
    .catch(err=>{
      setLoading('resetBtn',false,'Send Reset Link');
      showMsg('resetErr',err.code==='auth/user-not-found'?'No account with this email.':err.message,'error');
    });
}

// Enter key support
document.addEventListener('keydown',e=>{ if(e.key==='Enter'){ if(document.getElementById('panelLogin').style.display!=='none')doLogin(); else doReset(); } });

// Redirect if already logged in
auth.onAuthStateChanged(u=>{ if(u) window.location.href='dashboard.html'; });
</script>
</body>
</html>
